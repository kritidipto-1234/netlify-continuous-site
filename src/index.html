  <script>
    var kritiSiteAcc = +new URLSearchParams(window.location.search).get('id') || 640628;
    console.log("account id", kritiSiteAcc)
  </script>
  <script type="text/javascript" id="vwoCode">
    window._vwo_code =
      window._vwo_code ||
      (function () {
        var account_id = kritiSiteAcc,
          version = 1.5,
          settings_tolerance = 2000,
          library_tolerance = 2500,
          use_existing_jquery = false,
          is_spa = 1,
          hide_element = "body",
          hide_element_style = "opacity:0 !important;filter:alpha(opacity=0) !important;background:none !important",
          /* DO NOT EDIT BELOW THIS LINE */
          f = false,
          d = document,
          vwoCodeEl = d.querySelector("#vwoCode"),
          code = {
            use_existing_jquery: function () {
              return use_existing_jquery;
            },
            library_tolerance: function () {
              return library_tolerance;
            },
            hide_element_style: function () {
              return "{" + hide_element_style + "}";
            },
            finish: function () {
              if (!f) {
                f = true;
                var e = d.getElementById("_vis_opt_path_hides");
                if (e) e.parentNode.removeChild(e);
              }
            },
            finished: function () {
              return f;
            },
            load: function (e) {
              var t = d.createElement("script");
              t.fetchPriority = "high";
              t.src = e;
              t.type = "text/javascript";
              t.onerror = function () {
                _vwo_code.finish();
              };
              d.getElementsByTagName("head")[0].appendChild(t);
            },
            getVersion: function () {
              return version;
            },
            getMatchedCookies: function (e) {
              var t = [];
              if (document.cookie) {
                t = document.cookie.match(e) || [];
              }
              return t;
            },
            getCombinationCookie: function () {
              var e = code.getMatchedCookies(/(?:^|;)\s?(_vis_opt_exp_\d+_combi=[^;$]*)/gi);
              e = e.map(function (e) {
                try {
                  var t = decodeURIComponent(e);
                  if (!/_vis_opt_exp_\d+_combi=(?:\d+,?)+\s*$/.test(t)) {
                    return "";
                  }
                  return t;
                } catch (e) {
                  return "";
                }
              });
              var i = [];
              e.forEach(function (e) {
                var t = e.match(/([\d,]+)/g);
                t && i.push(t.join("-"));
              });
              return i.join("|");
            },
            init: function () {
              if (d.URL.indexOf("__vwo_disable__") > -1) return;
              window.settings_timer = setTimeout(function () {
                _vwo_code.finish();
              }, settings_tolerance);
              var e = d.createElement("style"),
                t = hide_element ? hide_element + "{" + hide_element_style + "}" : "",
                i = d.getElementsByTagName("head")[0];
              e.setAttribute("id", "_vis_opt_path_hides");
              vwoCodeEl && e.setAttribute("nonce", vwoCodeEl.nonce);
              e.setAttribute("type", "text/css");
              if (e.styleSheet) e.styleSheet.cssText = t;
              else e.appendChild(d.createTextNode(t));
              i.appendChild(e);
              var n = this.getCombinationCookie();
              this.load(
                "https://dev.visualwebsiteoptimizer.com/j.php?a=" +
                account_id +
                "&u=" +
                encodeURIComponent(d.URL) +
                "&f=" +
                +is_spa +
                "&vn=" +
                version +
                (n ? "&c=" + n : "")
              );
              return settings_timer;
            },
          };
        window._vwo_settings_timer = code.init();
        return code;
      })();
  </script>

<body>
  <!--React project-->
  kriti
  <div id="root" style="height: 150vh;"></div>

  <div style="position:fixed;bottom:0;left:0;right:0;background:#1e1e1e;color:#d4d4d4;font-family:monospace;font-size:13px;z-index:99999;border-top:2px solid #007acc;">
    <div style="display:flex;align-items:center;padding:6px 10px;gap:8px;background:#252526;">
      <label style="color:#888;white-space:nowrap;">GET</label>
      <input id="lna-url" type="text" placeholder="https://example.com/api" style="flex:1;padding:5px 8px;border:1px solid #3c3c3c;border-radius:3px;background:#1e1e1e;color:#d4d4d4;font-family:monospace;font-size:13px;outline:none;" />
      <button id="lna-send" style="padding:5px 14px;background:#007acc;color:#fff;border:none;border-radius:3px;cursor:pointer;font-family:monospace;font-size:13px;">Send</button>
      <button id="lna-clear" style="padding:5px 10px;background:#3c3c3c;color:#aaa;border:none;border-radius:3px;cursor:pointer;font-family:monospace;font-size:13px;">Clear</button>
    </div>
    <pre id="lna-log" style="margin:0;padding:8px 10px;max-height:180px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;font-size:12px;"></pre>
  </div>

  <script>
    (function () {
      var urlInput = document.getElementById('lna-url');
      var logEl = document.getElementById('lna-log');

      function log(msg, color) {
        var line = document.createElement('div');
        line.style.color = color || '#d4d4d4';
        line.style.marginBottom = '4px';
        line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight;
      }

      document.getElementById('lna-send').addEventListener('click', function () {
        var url = urlInput.value.trim();
        if (!url) return;
        log('GET ' + url, '#569cd6');
        fetch(url,{
            targetAddressSpace: "private",  // tells Chrome upfront: "this is a local network request"
          })
          .then(function (res) {
            log('Status: ' + res.status + ' ' + res.statusText, res.ok ? '#6a9955' : '#f48771');
            return res.text();
          })
          .then(function (body) {
            log(body.length > 2000 ? body.substring(0, 2000) + '... (truncated)' : body, '#d4d4d4');
          })
          .catch(function (err) {
            log('Error: ' + err.message, '#f48771');
          });
      });

      urlInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') document.getElementById('lna-send').click();
      });

      document.getElementById('lna-clear').addEventListener('click', function () {
        logEl.innerHTML = '';
      });
    })();
  </script>
</body>

</html>
